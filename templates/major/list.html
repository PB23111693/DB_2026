{% extends "base.html" %}
{% block title %}专业管理{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h3>专业列表</h3>
    <a href="{{ url_for('base_data.major_add') }}" class="btn btn-primary">添加专业</a>
</div>
<table class="table table-striped">
    <thead><tr><th>编号</th><th>名称</th><th>所属院系</th><th>学制</th><th>学位</th><th>操作</th></tr></thead>
    <tbody>
    {% for m in majors %}
        <tr>
            <td>{{ m.major_id }}</td>
            <td>{{ m.major_name }}</td>
            <td>{{ m.department.dept_name if m.department else '' }}</td>
            <td>{{ m.duration or '' }}</td>
            <td>{{ m.degree_type or '' }}</td>
            <td>
                <a href="{{ url_for('base_data.major_edit', major_id=m.major_id) }}" class="btn btn-sm btn-warning">编辑</a>
                <form method="POST" action="{{ url_for('base_data.major_delete', major_id=m.major_id) }}" style="display:inline;"
                      onsubmit="return confirm('确认删除此专业？');">
                    <button class="btn btn-sm btn-danger">删除</button>
                </form>
            </td>
        </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
